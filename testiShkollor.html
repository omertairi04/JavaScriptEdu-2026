<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    const piktETestit = prompt("Vendosni piket e testit");

    // 1 = 0 -> 25
    // 2 = 26 -> 40
    // 3 = 41 -> 60
    // 4 = 61 -> 80
    // 5 = 81 -> 100

    // EDHE = &&
    // OSE = ||
    // JO = !

    if (piktETestit >= 0 && piktETestit <= 25) {
      alert("NOTA 1");
    } else if (piktETestit >= 26 && piktETestit <= 40) {
      alert("NOTA 2");
    } else if (piktETestit >= 41 && piktETestit <= 60) {
      alert("NOTA 3");
    } else if (piktETestit >= 61 && piktETestit <= 80) {
      alert("NOTA 4");
    } else {
      alert("NOTA 5");
    }
  </script>
</html>
