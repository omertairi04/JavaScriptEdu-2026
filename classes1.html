<script>

  class Person {
    emer;
    mbiemer;
    #vitet;

    constructor(emer, mbiemer, vitet) {
      this.emer = emer;
      this.mbiemer = mbiemer;
      this.#vitet = vitet;
    }

    toString () {
      return `${this.emer} ${this.mbiemer} - ${this.#vitet}`;
    }

    getVitet() {
      return this.#vitet;
    }

    setVitet(vitetEReja) {
      this.#vitet = vitetEReja;
    }
    
  }

  const p = new Person("Omer", "Tairi", 21);
  // console.log(p.toString());
  
  console.log(p.emer);
  console.log(p.getVitet());
  
  p.setVitet(p.getVitet() + 1);

  console.log(p.getVitet());



</script>
