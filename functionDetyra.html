    <script>

      // numri1 = parseFloat(numri1);

      function zbritja(vlera1, operacioni, vlera2) {
        if (operacioni === "+") {
          console.log(vlera1 + vlera2);
        } else if (operacioni === "-") {
          console.log(vlera1 - vlera2);
        } else if (operacioni === "/") {
          console.log(vlera1 / vlera2);
        } else {
          console.log(vlera1 * vlera2);
        }
      }

      // zbritja(numri1,operacioni ,numri2);

      function palindrom(teksti) {
        let vazhdo = true;

        for (let i = 0; i < teksti.length; i++) {
          if (teksti[i] !== teksti[teksti.length - 1 - i]) {
            vazhdo = false;
          }
        }

        if (vazhdo === false) {
          console.log("Nuk esht palindrom");
        } else {
          console.log("Esht palindrom");
        }
      }

      palindrom("talat");
      palindrom("2321");
      palindrom("4321");

      let emri = prompt("shkruj emrin")

      function pershendet(emri) {
        console.log("Përshëndetje, " + emri);
      }

      pershendet(emri);


    </script>
