  const usersDiv = document.getElementById("users");
  const users = [];
  
  class User {
    constructor(username, password, ngjyra) {
      this.username = username;
      this.password = password;
      this.ngjyra = ngjyra;
    }

    toString() {
      return "User with username= " + this.username + "\n";
    }
  }

  function signup() {
    const username = document.getElementById("username").value;
    const pass1 = document.getElementById("password").value;
    const pass2 = document.getElementById("confirm-password").value;
    const ngjyra = document.getElementById("ngjyra").value;

    if (pass1 < 8 || pass1 !== pass2) return;

    for(let i=0;i<users.length;i++) {
      if (username === users[i].username) {
        alert("User egziston me username = " + username);
        return;
      }
    }

    const user = new User(username, pass1, ngjyra);

    users.push(user);

    shfaqPerdoruesit();

  }

  function shfaqPerdoruesit() {
    usersDiv.textContent = "";

    for (let i=0;i<users.length;i++) {

      const p = document.createElement("p");

      p.textContent = users[i].toString();
      p.style.color = users[i].ngjyra;
      
      usersDiv.appendChild(p);
    }
  }
