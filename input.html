<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    const numraNegtiv = [];
    const numratPozitiv = [];
    const vleratTjera = [];

    let vlera = prompt("Jep vleren");

    while (vlera !== null) {
      if (vlera < 0) {
        alert("Numri eshte negativ (1)");
        numraNegtiv.push(vlera);
        vlera = prompt("Jep vleren");
      } else if (vlera > 0) {
        alert("Numri eshte positiv (2)");
        numratPozitiv.push(vlera);
        vlera = prompt("Jep vleren");
      } else {
        alert("Vler tjeter!");
        vleratTjera.push(vlera);
        vlera = prompt("Jep vleren");
      }
    }
  </script>
</html>
