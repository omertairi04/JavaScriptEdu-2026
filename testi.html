  <body></body>
  <script>
    let pikt = prompt("Vendos pikt e testit");

    if (pikt >= 90) {
      alert("Shkelqyshem");
    } else if (pikt >= 70 && pikt <= 89) {
      alert("Shum mir");
    } else if (pikt >= 50 && pikt <= 69) {
      alert("Mir");
    } else {
      alert("Deshtim");
    }
  </script>
