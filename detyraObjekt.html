  <script>
    function Rental(emer, adres) {
      this.emer = emer;
      this.adres = adres;
      this.veturat = [];

      this.toString = function () {
        return this.emer + " - " + this.adres + " - " + this.veturat.length;
      };

      this.shtoVetur = function (vetur) {
        this.veturat.push(vetur);
      };

      this.shfaqGjithVeturat = function () {
        for (let i = 0; i < this.veturat.length; i++) {
          console.log(this.veturat[i].toString());
        }
      };

      this.rezervoVetur = function (vetur) {
        for (let i = 0; i < this.veturat.length; i++) {
          if (this.veturat[i] == vetur) {
            this.veturat[i].status = "RESERVED";
          }
        }
      };

      this.shfaqVeturatELira = function () {
        for (let i = 0; i < this.veturat.length; i++) {
          if (this.veturat[i].status === "FREE") {
            console.log(this.veturat[i].toString());
          }
        }
      };
    }

    function Vetura(brendi, modeli) {
      this.brendi = brendi;
      this.modeli = modeli;
      this.status = "FREE";

      this.toString = function () {
        return this.brendi + " " + this.modeli + " - " + this.status;
      };
    }

    const bmw = new Vetura("Bmw", "M3");
    const mercedes = new Vetura("Mercedez Benz", "Cls");
    const audi = new Vetura("Audi", "A6");

    rental.shtoVetur(bmw);

    rental.shfaqGjithVeturat();
